# Square bracket rules for building the 66-book Protestant edition
# from the 77-book Orthodox edition.
#
# Actions (do:)
#   delete          remove [bracket] and its content entirely
#   italic          replace [text] with <i>text</i>
#   unwrap          remove brackets, keep text as-is
#   round           replace [text] with (text)
#   keep            preserve brackets unchanged (skip processing)
#   capitalize      uppercase first letter of the word after bracket
#   lowercase       lowercase first letter of the word after bracket
#   shift-left      move the word right of bracket to the left side
#   replace: "x"    replace [bracket] with given text
#   replace: {text: "x", italic: true}   same, wrapped in <i>
#   strip: {SIDE: punct|word, count: N}   remove words/punctuation
#   insert: {SIDE: "char"}                add text/punctuation
#   regex: {from: "re", to: "str"}        regex substitution in verse
#   pull-in: N      move N words from left into the bracket
#
# SIDE: left, right, begin (start of verse), end, inner (inside bracket)
#
# Fields: place (chapter:verse), bracket (N-th bracket), occurrence (N-th paragraph)

